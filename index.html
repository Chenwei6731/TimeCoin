<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeCoin - 时间币公开账本</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.5.0/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .contract-info {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
            word-break: break-all;
            margin-bottom: 16px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .record-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .record-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .record-type {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .record-time {
            color: #666;
            font-size: 0.9em;
        }
        
        .record-details {
            color: #333;
            line-height: 1.6;
        }
        
        .record-details strong {
            color: #667eea;
        }
        
        .address {
            font-family: monospace;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .wallet-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 0.9em;
        }
        
        .wallet-status.connected {
            background: rgba(76, 175, 80, 0.3);
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5252;
        }
        
        .wallet-status.connected .dot {
            background: #4caf50;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>⏰ TimeCoin 时间币</h1>
            <p>公开透明的时间价值记录系统 | 基于 Polygon 区块链</p>
            <div style="margin-top: 20px;">
                <span id="walletStatus" class="wallet-status">
                    <span class="dot"></span>
                    <span id="walletText">未连接钱包</span>
                </span>
                <button class="btn" onclick="connectWallet()" style="margin-left: 10px;">连接 MetaMask</button>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">总发行量</div>
                <div class="stat-value" id="totalSupply">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">发行记录数</div>
                <div class="stat-value" id="issueCount">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">转账记录数</div>
                <div class="stat-value" id="transferCount">-</div>
            </div>
        </div>

        <!-- 合约信息 -->
        <div class="card">
            <div class="card-title">📋 合约信息</div>
            <div class="contract-info">
                <strong>合约地址：</strong>0x1b467aed694a6d49c3871b87b7cbcb37147d2214<br>
                <strong>网络：</strong>Polygon 主网 (Chain ID: 137)<br>
                <strong>代币名称：</strong>TimeCoin (TIME)<br>
                <strong>精度：</strong>0 位（整数）
            </div>
            <button class="btn" onclick="loadStats()">🔄 刷新数据</button>
        </div>

        <!-- 余额查询 -->
        <div class="card">
            <div class="card-title">🔍 余额查询</div>
            <div class="input-group">
                <input type="text" class="input" id="queryAddress" placeholder="输入钱包地址 (0x...)">
                <button class="btn" onclick="queryBalance()">查询</button>
            </div>
            <div id="balanceResult"></div>
        </div>

        <!-- 发行记录 -->
        <div class="card">
            <div class="card-title">📈 发行记录</div>
            <div id="issueRecords" class="record-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 转账记录 -->
        <div class="card">
            <div class="card-title">💸 转账记录</div>
            <div id="transferRecords" class="record-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 合约配置
        const CONTRACT_ADDRESS = '0x1b467aed694a6d49c3871b87b7cbcb37147d2214';
        const CHAIN_ID = 137; // Polygon 主网
        
        // ABI
        const ABI = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"provider","type":"address"},{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"date","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"timestamp","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"recordIndex","type":"uint256"}],"name":"Issue","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"from","type":"address"},{"indexed":true,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"date","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"timestamp","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"recordIndex","type":"uint256"}],"name":"Transfer","type":"event"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"newIssuer","type":"address"}],"name":"changeIssuer","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getIssueRecordCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"start","type":"uint256"},{"internalType":"uint256","name":"limit","type":"uint256"}],"name":"getIssueRecords","outputs":[{"components":[{"internalType":"address","name":"provider","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"uint256","name":"date","type":"uint256"},{"internalType":"uint256","name":"timestamp","type":"uint256"},{"internalType":"string","name":"memo","type":"string"}],"internalType":"struct TimeCoin.IssueRecord[]","name":"","type":"tuple[]"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getTransferRecordCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"_provider","type":"address"},{"internalType":"uint256","name":"_amount","type":"uint256"},{"internalType":"uint256","name":"_date","type":"uint256"},{"internalType":"string","name":"_memo","type":"string"}],"name":"issue","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"issueRecords","outputs":[{"internalType":"address","name":"provider","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"uint256","name":"date","type":"uint256"},{"internalType":"uint256","name":"timestamp","type":"uint256"},{"internalType":"string","name":"memo","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"issuer","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"name","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"_to","type":"address"},{"internalType":"uint256","name":"_amount","type":"uint256"},{"internalType":"uint256","name":"_date","type":"uint256"},{"internalType":"string","name":"_memo","type":"string"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"transferRecords","outputs":[{"internalType":"address","name":"from","type":"address"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"uint256","name":"date","type":"uint256"},{"internalType":"uint256","name":"timestamp","type":"uint256"},{"internalType":"string","name":"memo","type":"string"}],"stateMutability":"view","type":"function"}];

        let web3;
        let contract;
        let userAddress = null;

        // 初始化
        async function init() {
            // 使用公共 RPC（无需钱包也能查看数据）
            web3 = new Web3('https://polygon-rpc.com');
            contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
            
            // 加载数据
            await loadStats();
            await loadIssueRecords();
            await loadTransferRecords();
            
            // 检查是否已连接钱包
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    await connectWallet();
                }
            }
        }

        // 连接钱包
        async function connectWallet() {
            if (!window.ethereum) {
                alert('请安装 MetaMask 钱包！');
                return;
            }
            
            try {
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts' 
                });
                
                // 切换到 Polygon 网络
                await switchToPolygon();
                
                // 使用用户的钱包重新初始化 web3
                web3 = new Web3(window.ethereum);
                contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
                
                userAddress = accounts[0];
                updateWalletStatus(true, userAddress);
                
                // 重新加载数据
                await loadStats();
                
            } catch (error) {
                console.error('连接钱包失败:', error);
                alert('连接钱包失败: ' + error.message);
            }
        }

        // 切换到 Polygon 网络
        async function switchToPolygon() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x89' }], // 137 的十六进制
                });
            } catch (switchError) {
                // 如果网络不存在，添加网络
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x89',
                            chainName: 'Polygon Mainnet',
                            nativeCurrency: {
                                name: 'MATIC',
                                symbol: 'MATIC',
                                decimals: 18
                            },
                            rpcUrls: ['https://polygon-rpc.com'],
                            blockExplorerUrls: ['https://polygonscan.com']
                        }]
                    });
                }
            }
        }

        // 更新钱包状态显示
        function updateWalletStatus(connected, address) {
            const statusEl = document.getElementById('walletStatus');
            const textEl = document.getElementById('walletText');
            
            if (connected) {
                statusEl.classList.add('connected');
                textEl.textContent = address.slice(0, 6) + '...' + address.slice(-4);
            } else {
                statusEl.classList.remove('connected');
                textEl.textContent = '未连接钱包';
            }
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const totalSupply = await contract.methods.totalSupply().call();
                const issueCount = await contract.methods.getIssueRecordCount().call();
                const transferCount = await contract.methods.getTransferRecordCount().call();
                
                document.getElementById('totalSupply').textContent = totalSupply.toString();
                document.getElementById('issueCount').textContent = issueCount.toString();
                document.getElementById('transferCount').textContent = transferCount.toString();
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 查询余额
        async function queryBalance() {
            const address = document.getElementById('queryAddress').value.trim();
            const resultEl = document.getElementById('balanceResult');
            
            if (!address || !address.startsWith('0x')) {
                resultEl.innerHTML = '<div class="error">请输入有效的地址（以 0x 开头）</div>';
                return;
            }
            
            try {
                const balance = await contract.methods.balanceOf(address).call();
                resultEl.innerHTML = `
                    <div class="success">
                        <strong>地址：</strong><span class="address">${address}</span><br>
                        <strong>余额：</strong>${balance} TIME
                    </div>
                `;
            } catch (error) {
                resultEl.innerHTML = '<div class="error">查询失败: ' + error.message + '</div>';
            }
        }

        // 加载发行记录
        async function loadIssueRecords() {
            const container = document.getElementById('issueRecords');
            
            try {
                const count = await contract.methods.getIssueRecordCount().call();
                
                if (count == 0) {
                    container.innerHTML = '<div class="loading">暂无发行记录</div>';
                    return;
                }
                
                let html = '';
                // 倒序显示最新的 10 条
                for (let i = Math.max(0, count - 10); i < count; i++) {
                    const record = await contract.methods.issueRecords(i).call();
                    const date = new Date(Number(record.timestamp) * 1000).toLocaleString('zh-CN');
                    
                    html += `
                        <div class="record-item">
                            <div class="record-header">
                                <span class="record-type">发行 #${i + 1}</span>
                                <span class="record-time">${date}</span>
                            </div>
                            <div class="record-details">
                                <strong>接收方：</strong><span class="address">${record.provider}</span><br>
                                <strong>数量：</strong>${record.amount} TIME<br>
                                <strong>日期：</strong>${record.date}<br>
                                <strong>备注：</strong>${record.memo || '无'}
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('加载发行记录失败:', error);
                container.innerHTML = '<div class="error">加载失败: ' + error.message + '</div>';
            }
        }

        // 加载转账记录
        async function loadTransferRecords() {
            const container = document.getElementById('transferRecords');
            
            try {
                const count = await contract.methods.getTransferRecordCount().call();
                
                if (count == 0) {
                    container.innerHTML = '<div class="loading">暂无转账记录</div>';
                    return;
                }
                
                let html = '';
                // 倒序显示最新的 10 条
                for (let i = Math.max(0, count - 10); i < count; i++) {
                    const record = await contract.methods.transferRecords(i).call();
                    const date = new Date(Number(record.timestamp) * 1000).toLocaleString('zh-CN');
                    
                    html += `
                        <div class="record-item">
                            <div class="record-header">
                                <span class="record-type">转账 #${i + 1}</span>
                                <span class="record-time">${date}</span>
                            </div>
                            <div class="record-details">
                                <strong>发送方：</strong><span class="address">${record.from}</span><br>
                                <strong>接收方：</strong><span class="address">${record.to}</span><br>
                                <strong>数量：</strong>${record.amount} TIME<br>
                                <strong>日期：</strong>${record.date}<br>
                                <strong>备注：</strong>${record.memo || '无'}
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('加载转账记录失败:', error);
                container.innerHTML = '<div class="error">加载失败: ' + error.message + '</div>';
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
        
        // 监听账户变化
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    connectWallet();
                } else {
                    userAddress = null;
                    updateWalletStatus(false);
                }
            });
        }
    </script>
</body>
</html>
